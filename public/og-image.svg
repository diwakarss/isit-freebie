<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Dashed border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="8" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="88" fill="#F59E0B" letter-spacing="-2">IS IT A FREEBIE?</text>
  <!-- Subtitle -->
  <text x="600" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#A1A1AA">Type any government scheme. We score it.</text>
  <!-- Stamp -->
  <g transform="translate(600 460) rotate(-6)">
    <rect x="-160" y="-40" width="320" height="80" rx="4" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <rect x="-155" y="-35" width="310" height="70" rx="2" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <text x="0" y="12" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="36" fill="#F59E0B" letter-spacing="4">WELFARE OR NOT?</text>
  </g>
  <!-- URL -->
  <text x="600" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#A1A1AA" opacity="0.5">isitafreebie.jdlabs.top</text>
</svg>
